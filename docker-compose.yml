version: '3.9'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/grocerybill
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - STORAGE_TYPE=local
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads
    restart: unless-stopped

  worker:
    build: .
    command: node -e "require('./src/worker/index.ts')"
    # For a compiled build, override with: node dist/worker/index.js
    # The worker shares the same image as the app; only the entrypoint differs.
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/grocerybill
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - STORAGE_TYPE=local
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grocerybill
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
